name: Compose Multiplatform CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux-android-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Run Multiplatform Tests
        run: ./gradlew check --continue

      - name: Build Android App
        run: ./gradlew assembleDebug

      - name: Build Linux Desktop App
        run: ./gradlew packageDistributionForCurrentOS || ./gradlew desktopJar || echo "No desktop task"

      - name: Build Web App
        run: ./gradlew wasmJsBrowserDistribution || ./gradlew jsBrowserDistribution || echo "No web task"

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: '**/build/outputs/apk/debug/*.apk'

      - name: Upload Linux Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-desktop-jar
          path: '**/build/compose/jars/*.jar'

      - name: Upload Web Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-distribution
          path: '**/build/dist/**'

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Compile iOS Framework
        run: ./gradlew linkDebugFrameworkIosX64 || ./gradlew iosX64MainBinaries || echo "No iOS task"